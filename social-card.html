<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrum Trainer — Social Card</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:
      radial-gradient(900px 500px at 85% -10%, #d4ecf2 0, transparent 60%),
      radial-gradient(800px 600px at 0% 110%, #e0f4f2 0, transparent 55%),
      linear-gradient(180deg, #f0f7fa 0%, #ffffff 100%);
    color:#0c2a36;
    padding:60px 72px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
  }
  /* subtle teal accent line at top */
  body::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:5px;
    background:linear-gradient(90deg, #0f766e, #14b8a6, #5eead4, transparent);
  }
  .header{display:flex;align-items:center;gap:20px}
  .logo{
    width:80px;height:80px;border-radius:20px;
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    display:grid;place-items:center;
    font-weight:800;color:#fff;font-size:42px;
    box-shadow:0 8px 24px rgba(15,118,110,.22);
  }
  .brand{font-size:52px;font-weight:800;letter-spacing:-0.8px;color:#0c2a36}
  .sub{color:#5d7a86;font-size:18px;margin-top:6px;letter-spacing:.2px;font-weight:500}

  .center{margin-top:-6px}
  .big{
    font-size:160px;
    font-weight:800;
    line-height:1;
    background:linear-gradient(135deg, #0f766e, #14b8a6);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin-bottom:8px;
    letter-spacing:-3px;
  }
  .label{font-size:28px;color:#0c2a36;font-weight:600;letter-spacing:.1px}
  .label .accent{
    color:#0f766e;
    font-weight:700;
  }
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:24px}
  .chip{
    font-size:14px;
    padding:8px 16px;
    border-radius:99px;
    background:#ffffff;
    border:1px solid #cfe5ec;
    color:#0c2a36;
    font-weight:600;
    letter-spacing:.2px;
    box-shadow:0 1px 2px rgba(15,30,40,.04);
  }
  .footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    color:#5d7a86;
    font-size:15px;
    font-weight:500;
  }
  .footer b{color:#0f766e;font-weight:700}
</style>
</head>
<body>

<div class="header">
  <div class="logo">S</div>
  <div>
    <div class="brand">Scrum Trainer</div>
    <div class="sub">Practice trainers for Scrum.org certifications</div>
  </div>
</div>

<div class="center">
  <div class="big">955</div>
  <div class="label">practice questions across <span class="accent">8 certifications</span></div>
  <div class="chips">
    <span class="chip">PSPO I</span>
    <span class="chip">PSM I</span>
    <span class="chip">PSD I</span>
    <span class="chip">PSK I</span>
    <span class="chip">PAL-E</span>
    <span class="chip">PSPO-AI</span>
    <span class="chip">PSF Skills</span>
    <span class="chip">PPDV</span>
  </div>
</div>

<div class="footer">
  <div>Grounded in <b>Scrum Guide 2020</b> &middot; <b>EBM Guide</b> &middot; <b>Kanban Guide for Scrum Teams</b></div>
  <div>Free &middot; Open source &middot; No signup</div>
</div>

</body>
</html>
